version: '3.8'

services:
  x-fusion-panel:
    build:
      context: .
      dockerfile: Dockerfile
    image: sijuly0713/x-fusion-panel-pro:latest
    container_name: x-fusion-panel
    restart: always
    ports:
      - "0.0.0.0:8081:8080"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - XUI_USERNAME=${XUI_USERNAME:-admin}
      - XUI_PASSWORD=${XUI_PASSWORD:-admin}
      - XUI_SECRET_KEY=${XUI_SECRET_KEY:-sijuly_secret_key}

  # ⚠️ ARM 兼容版 subconverter（推荐方案）
  subconverter:
    image: ghcr.io/metacubex/subconverter:latest
    container_name: subconverter
    restart: always
    expose:
      - "25500"
    environment:
      - TZ=Asia/Shanghai
